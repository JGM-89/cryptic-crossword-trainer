<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Cruci app mark: a numbered crossword cell holding a serif "C".
       Full-bleed paper background; the cell sits in the maskable safe zone. -->
  <rect width="512" height="512" fill="#f4ece0"/>
  <rect x="106" y="106" width="300" height="300" rx="26" fill="#fcf8f0" stroke="#221d15" stroke-width="18"/>
  <text x="132" y="170" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="46" font-weight="600" fill="#6b6051">1</text>
  <text x="256" y="372" font-family="Georgia, 'Times New Roman', serif" font-size="270" font-weight="700" fill="#214536" text-anchor="middle">C</text>
</svg>
